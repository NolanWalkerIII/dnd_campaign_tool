services:
  dnd:
    build: .
    volumes:
      - ./instance:/app/instance
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.campaigncodex.rule=Host(`campaigncodex.momentumlabs.cloud`)"
      - "traefik.http.routers.campaigncodex.entrypoints=websecure"
      - "traefik.http.routers.campaigncodex.tls=true"
      - "traefik.http.routers.campaigncodex.tls.certresolver=letsencrypt"
      - "traefik.http.services.campaigncodex.loadbalancer.server.port=5000"
      - "traefik.docker.network=root_default"
    networks:
      - root_default

networks:
  root_default:
    external: true
