services:
  dnd:
    build: .
    ports:
      - "5001:5000"
    volumes:
      # Persist the SQLite database across container restarts (dev / no-Postgres mode)
      - ./instance:/app/instance
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    # Uncomment to use PostgreSQL — set DATABASE_URL in .env and enable 'db' service below:
    #   DATABASE_URL=postgresql://quester:quester@db:5432/questerledger
    # depends_on:
    #   db:
    #     condition: service_healthy

