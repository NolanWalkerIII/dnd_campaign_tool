{% extends "base.html" %}
{% block title %}Login — D&D Manager{% endblock %}

{% block content %}
<div style="max-width:400px; margin:4rem auto;">
  <h1 style="text-align:center; margin-bottom:0.25rem;">Welcome Back</h1>
  <p style="text-align:center; color:var(--muted); margin-bottom:2rem;">Sign in to continue your adventure</p>

  <div class="card">
    <form method="POST" action="/login">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Login</button>
    </form>
  </div>

  <p style="text-align:center; color:var(--muted); font-size:0.88rem; margin-top:1rem;">
    Don't have an account?
    <a href="/register" style="color:var(--gold);">Register here</a>
  </p>
</div>
{% endblock %}
