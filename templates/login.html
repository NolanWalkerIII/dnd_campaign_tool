{% extends "base.html" %}
{% block title %}Login — Campaign Codex{% endblock %}

{% block content %}
<div style="max-width:420px; margin:3rem auto;">

  <!-- Logo -->
  <div style="text-align:center; margin-bottom:2rem;">
    <img src="/static/img/logo/campaign-codex-dark.png"
         alt="Campaign Codex"
         style="height:56px; width:auto; margin-bottom:1.25rem;">
    <h1 style="font-size:1.4rem; margin-bottom:0.25rem;">Welcome Back</h1>
    <p style="color:var(--muted); font-size:0.9rem;">Sign in to continue your adventure</p>
  </div>

  <div class="card" style="border-color:var(--gold);">
    <form method="POST" action="/login">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Login</button>
    </form>
  </div>

  <p style="text-align:center; color:var(--muted); font-size:0.88rem; margin-top:1rem;">
    Don't have an account?
    <a href="/register" style="color:var(--gold);">Register here</a>
  </p>

</div>
{% endblock %}
